<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolderFlow Workspace</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Production versions for speed) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel standalone for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Configuration to stop Babel from using blocked 'import' statements -->
    <script>
        Babel.registerPreset('react-classic-safe', {
            presets: [
                [Babel.availablePresets.react, { runtime: 'classic' }]
            ]
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic-safe">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Safe ID Generator for Local Files ---
        const generateId = () => {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                try { return crypto.randomUUID(); } catch (e) {}
            }
            return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 9);
        };

        // --- Custom Lightweight SVG Icons ---
        const FolderIcon = ({ className = "w-5 h-5" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
        );

        const FileTextIcon = ({ className = "w-5 h-5" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        );

        const TrashIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        );

        const PlusIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
          </svg>
        );

        const CheckIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
          </svg>
        );

        const PasteIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        );

        const CopyIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
        );

        const UndoIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
          </svg>
        );

        const RedoIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m-6-6l-6-6" />
          </svg>
        );

        const InfoIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        );

        const OverviewIcon = ({ className = "w-5 h-5" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
        );

        const ChartIcon = ({ className = "w-6 h-6" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
          </svg>
        );

        const LockIcon = ({ className = "w-4 h-4" }) => (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        );

        // Helper to format logs cleanly like: YYYY/MM/DD At HH:MM (+x%)
        const formatLogDate = (ts, delta) => {
            const d = new Date(ts);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd} At ${hh}:${min} (+${delta}%)`;
        };

        // --- Helper functions for mapping Text Ranges & Style tags dynamically ---
        function parseHtmlToStyles(html) {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html || '', 'text/html');
          const chars = [];
          const styles = [];
          
          function walk(node, currentStyle) {
            if (node.nodeType === Node.TEXT_NODE) {
              const text = node.textContent;
              for (let i = 0; i < text.length; i++) {
                chars.push(text[i]);
                styles.push(currentStyle);
              }
            } else if (node.nodeType === Node.ELEMENT_NODE) {
              let nextStyle = currentStyle;
              if (node.className && node.className.includes('bg-red-200')) {
                nextStyle = 'red';
              } else if (node.className && node.className.includes('bg-green-200')) {
                nextStyle = 'green';
              }
              for (let child of node.childNodes) {
                walk(child, nextStyle);
              }
            }
          }
          walk(doc.body, 'neutral');
          return { chars, styles };
        }

        function rebuildHtml(chars, styles) {
          let html = "";
          let currentStyle = 'neutral';
          
          for (let i = 0; i < chars.length; i++) {
            const char = chars[i];
            const escapedChar = char
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#039;");
              
            const style = styles[i];
            if (style !== currentStyle) {
              if (currentStyle !== 'neutral') {
                html += "</span>";
              }
              if (style === 'red') {
                html += '<span class="bg-red-200 text-red-900 rounded-sm px-0">';
              } else if (style === 'green') {
                html += '<span class="bg-green-200 text-green-900 rounded-sm px-0">';
              }
              currentStyle = style;
            }
            html += escapedChar;
          }
          if (currentStyle !== 'neutral') {
            html += "</span>";
          }
          return html;
        }

        // Transforms visual HTML spans into structured string tags (%g1, %r1, etc.)
        const htmlToTextWithTags = (html) => {
            let gCount = 1;
            let rCount = 1;
            const parser = new DOMParser();
            const doc = parser.parseFromString(html || '', 'text/html');
            
            let result = "";
            function walk(node, currentStyle) {
                if (node.nodeType === Node.TEXT_NODE) {
                    result += node.textContent;
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    let nextStyle = currentStyle;
                    let tagStart = "";
                    let tagEnd = "";
                    if (node.className && node.className.includes('bg-green-200')) {
                        tagStart = `%g${gCount}`;
                        tagEnd = `%g${gCount}`;
                        gCount++;
                        nextStyle = 'green';
                    } else if (node.className && node.className.includes('bg-red-200')) {
                        tagStart = `%r${rCount}`;
                        tagEnd = `%r${rCount}`;
                        rCount++;
                        nextStyle = 'red';
                    }
                    result += tagStart;
                    for (let child of node.childNodes) {
                        walk(child, nextStyle);
                    }
                    result += tagEnd;
                }
            }
            walk(doc.body, 'neutral');
            return result;
        };

        // Processing %g and %r highlights
        const applyShortcuts = (txt) => {
            if (!txt) return "";
            return txt.replace(/%g\d*([\s\S]*?)%g\d*/g, '<span class="bg-green-200 text-green-900 rounded-sm px-0">$1</span>')
                      .replace(/%r\d*([\s\S]*?)%r\d*/g, '<span class="bg-red-200 text-red-900 rounded-sm px-0">$1</span>');
        };

        const calcPct = (htmlText) => {
            if (!htmlText) return 0;
            const { styles } = parseHtmlToStyles(htmlText);
            const totalChars = styles.length;
            const greenChars = styles.filter(s => s === 'green').length;
            return totalChars > 0 ? Math.round((greenChars / totalChars) * 100) : 0;
        };

        // Time gate check (Spaced Repetition logic helper)
        const isStudyGated = (para) => {
          if (!para.lastStudied) return false; 
          const elapsed = Date.now() - para.lastStudied;
          const currentCount = para.studyCount || 0;
          
          if (currentCount === 1) return elapsed < (7.5 * 24 * 60 * 60 * 1000); 
          if (currentCount === 2) return elapsed < (7.5 * 24 * 60 * 60 * 1000); 
          if (currentCount === 3) return elapsed < (15 * 24 * 60 * 60 * 1000); 
          if (currentCount >= 4) return elapsed < (30 * 24 * 60 * 60 * 1000); 
          return false;
        };

        const getCooldownRemainingStr = (para) => {
          if (!para.lastStudied) return null;
          const elapsed = Date.now() - para.lastStudied;
          const currentCount = para.studyCount || 0;
          let cooldown = 0;
          if (currentCount === 1 || currentCount === 2) cooldown = 7.5 * 24 * 60 * 60 * 1000;
          else if (currentCount === 3) cooldown = 15 * 24 * 60 * 60 * 1000;
          else if (currentCount >= 4) cooldown = 30 * 24 * 60 * 60 * 1000;
          
          const remaining = cooldown - elapsed;
          if (remaining <= 0) return null;

          const d = Math.floor(remaining / (24 * 60 * 60 * 1000));
          const h = Math.floor((remaining % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
          if (d > 0) return `${d}d ${h}h remaining`;
          const m = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
          return `${h}h ${m}m remaining`;
        };

        // --- Core Application Logic ---
        function App() {
          const [docState, setDocState] = useState(() => {
            try {
              const savedF = localStorage.getItem('env_folders');
              const savedP = localStorage.getItem('env_paragraphs');
              const savedStaticStats = localStorage.getItem('env_static_percentages');
              const savedTodayLogs = localStorage.getItem('env_today_percentage_logs');
              
              return {
                folders: savedF ? JSON.parse(savedF) : [
                  { id: '1', name: 'Personal Projects', rating: 0 },
                  { id: '2', name: 'Work Research', rating: 50 },
                  { id: '3', name: 'Drafts', rating: 100 }
                ],
                paragraphs: savedP ? JSON.parse(savedP) : [
                  { id: '101', folderId: '1', text: 'This is an initial paragraph inside Personal Projects. You can edit this text directly, delete it, or add new paragraphs to organize your thoughts.', textBack: '', createdAt: Date.now(), archived: false, studyCount: 0, lastStudied: null },
                  { id: '102', folderId: '3', text: 'This paragraph lives inside the Drafts folder!', textBack: '', createdAt: Date.now() + 1, archived: false, studyCount: 0, lastStudied: null }
                ],
                // Tracking static week/month/allTime totals + Undo-aware logs for Today
                staticStats: savedStaticStats ? JSON.parse(savedStaticStats) : { week: 0, month: 0, allTime: 0 },
                todayPercentageLogs: savedTodayLogs ? JSON.parse(savedTodayLogs) : []
              };
            } catch (e) {
              return { 
                folders: [], 
                paragraphs: [], 
                staticStats: { week: 0, month: 0, allTime: 0 }, 
                todayPercentageLogs: [] 
              };
            }
          });

          const { folders, paragraphs, staticStats, todayPercentageLogs } = docState;

          const [selectedFolderId, setSelectedFolderId] = useState('1'); 
          const [lastActiveFolderId, setLastActiveFolderId] = useState('1'); 
          const [newFolderName, setNewFolderName] = useState('');
          
          // Paragraph Adding State
          const [isAddingBack, setIsAddingBack] = useState(false);
          const [newParagraphText, setNewParagraphText] = useState('');
          const [newParagraphTextBack, setNewParagraphTextBack] = useState('');
          
          // Paragraph Editing State
          const [editingParagraphId, setEditingParagraphId] = useState(null);
          const [editingSide, setEditingSide] = useState('front'); // 'front' | 'back'
          const [editingText, setEditingText] = useState('');
          const [editingTextBack, setEditingTextBack] = useState('');
          
          const [flippedParas, setFlippedParas] = useState(new Set()); // IDs of paras showing 'back' side
          
          const [searchQuery, setSearchQuery] = useState('');
          const [activeTab, setActiveTab] = useState('editor'); // 'editor' | 'readable'
          const [copySuccess, setCopySuccess] = useState(false);
          const [showArchived, setShowArchived] = useState(false);
          const [showPercentages, setShowPercentages] = useState(true);
          const [mergeTargetId, setMergeTargetId] = useState('');
          
          const [editingRatingFolderId, setEditingRatingFolderId] = useState(null);
          const [tempRatingVal, setTempRatingFolderVal] = useState('');
          const [editingFolderId, setEditingFolderId] = useState(null);
          const [tempFolderName, setTempFolderName] = useState('');

          const [contextMenu, setContextMenu] = useState({ visible: false, x: 0, y: 0, type: '', targetId: null });
          const [selectionMenu, setSelectionMenu] = useState({ visible: false, x: 0, y: 0, paraId: null, start: 0, end: 0, showRemove: false, styleContext: null });
          const [readableText, setReadableText] = useState("");
          const [excludedOverviewFolders, setExcludedOverviewFolders] = useState(new Set()); 

          const [statModal, setStatModal] = useState({ visible: false, title: '', paras: [] });
          const [highlightParaId, setHighlightParaId] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // History Stacks
          const [undoStack, setUndoStack] = useState([]);
          const [redoStack, setRedoStack] = useState([]);
          const lastHistorySaveTime = useRef(0);

          const textAreaRef = useRef(null);
          const sidebarListRef = useRef(null);
          const headerSliderRef = useRef(null);

          // Generate backup output text, including percentage tracking and formatted log zones
          const generateReadableText = (fData, pData, stats, logs) => {
            if (fData.length === 0) return "=== WORKSPACE ENVIRONMENT BACKUP ===\n\nNo folders found.";
            let output = "=== WORKSPACE ENVIRONMENT BACKUP ===\n\n";
            fData.forEach(folder => {
              output += `# ${folder.name} (${folder.rating || 0}%)\n`;
              const folderParas = pData.filter(p => p.folderId === folder.id);
              if (folderParas.length > 0) {
                folderParas.forEach(p => {
                  const status = p.archived ? '[ARCHIVED] ' : '';
                  const dateTag = new Date(p.createdAt).toLocaleDateString();
                  let meta = `[Created: ${dateTag}]`;
                  if (p.lastStudied) meta += ` [Studied: ${new Date(p.lastStudied).toLocaleDateString()}] [Count: ${p.studyCount || 0}]`;
                  
                  let frontText = htmlToTextWithTags(p.text).replace(/\n/g, '\n    ');
                  let backTag = p.textBack ? ` [BACK: ${htmlToTextWithTags(p.textBack).replace(/\n/g, '\\n')}]` : '';
                  output += `  • ${status}${frontText}${backTag} ${meta}\n`;
                });
              } else {
                output += `  (Empty folder)\n`;
              }
              output += "\n";
            });

            output += "\n=== PERCENTAGE TRACKING ===\n";
            output += `Week Total Points: ${stats?.week || 0}\n`;
            output += `Month Total Points: ${stats?.month || 0}\n`;
            output += `AllTime Total Points: ${stats?.allTime || 0}\n\n`;
            output += `[Today Logs]\n`;
            if (logs && logs.length > 0) {
              logs.forEach(log => {
                output += `  • ${formatLogDate(log.timestamp, log.delta)}\n`;
              });
            } else {
              output += `  (No logs for today)\n`;
            }

            return output.trim();
          };

          const parseTextToState = (text, currentState) => {
            const newFolders = [];
            const newParagraphs = [];
            let parsedStats = { week: 0, month: 0, allTime: 0 };
            let parsedTodayLogs = [];

            // Split file structure by tracking block
            const parts = text.split("=== PERCENTAGE TRACKING ===");
            const mainContent = parts[0] || "";
            const trackingContent = parts[1] || "";

            // 1. Parse Folders and Paragraphs
            const folderBlocks = mainContent.split(/(?=(?:^|\n)#\s)/);
            
            folderBlocks.forEach(block => {
              if (!block.trim().startsWith('#')) return; 
              
              const lines = block.trim().split('\n');
              const headerLine = lines[0].replace(/^#\s*/, '').trim();
              const match = headerLine.match(/^(.*?)(?:\s+\((\d+)%\))?$/);
              if (!match) return;
              
              const folderName = match[1].trim();
              const existingFolder = currentState.folders.find(f => f.name === folderName);
              const folderId = existingFolder ? existingFolder.id : generateId();
              
              newFolders.push({ id: folderId, name: folderName, rating: parseInt(match[2]) || 0 });
              
              let currentParaTextLines = [];
              let archived = false;
              
              const finalizePara = () => {
                if (currentParaTextLines.length > 0) {
                  let fullText = currentParaTextLines.join('\n').trim();
                  
                  let createdAt = Date.now();
                  let lastStudied = null;
                  let studyCount = 0;
                  let textBack = '';
                  
                  // Extract right to left
                  const countMatch = fullText.match(/\s+\[Count:\s*(\d+)\]$/);
                  if (countMatch) {
                      studyCount = parseInt(countMatch[1]) || 0;
                      fullText = fullText.substring(0, countMatch.index).trim();
                  }
                  
                  const studiedMatch = fullText.match(/\s+\[Studied:\s*(.*?)\]$/);
                  if (studiedMatch) {
                      const parsedD = new Date(studiedMatch[1]).getTime();
                      if (!isNaN(parsedD)) lastStudied = parsedD;
                      fullText = fullText.substring(0, studiedMatch.index).trim();
                  }
                  
                  const dateMatch = fullText.match(/\s+\[Created:\s*(.*?)\]$/);
                  if (dateMatch) {
                    const parsedDate = new Date(dateMatch[1]).getTime();
                    if (!isNaN(parsedDate)) createdAt = parsedDate;
                    fullText = fullText.substring(0, dateMatch.index).trim();
                  }
                  
                  const backMatch = fullText.match(/\s+\[BACK:\s*(.*?)\]$/);
                  if (backMatch) {
                    textBack = applyShortcuts(backMatch[1].replace(/\\n/g, '\n').trim());
                    fullText = fullText.substring(0, backMatch.index).trim();
                  }

                  const existingPara = currentState.paragraphs.find(p => p.createdAt === createdAt && p.folderId === folderId);
                  const paraId = existingPara ? existingPara.id : generateId();

                  newParagraphs.push({ 
                      id: paraId, 
                      folderId: folderId, 
                      text: applyShortcuts(fullText), 
                      textBack, 
                      createdAt, 
                      archived, 
                      studyCount, 
                      lastStudied 
                  });
                  currentParaTextLines = [];
                  archived = false;
                }
              };
              
              for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                if (line.match(/^\s*•\s*/)) {
                  finalizePara();
                  let pText = line.replace(/^\s*•\s*/, '').trimEnd();
                  if (pText.startsWith('[ARCHIVED] ')) {
                    archived = true;
                    pText = pText.substring(11);
                  }
                  currentParaTextLines.push(pText);
                } else if (currentParaTextLines.length > 0) {
                  if (line.trim() !== '') {
                      currentParaTextLines.push(line.replace(/^\s*/, '').trimEnd());
                  }
                }
              }
              finalizePara();
            });

            // 2. Parse Percentage Tracking metrics with new timestamp parser regex
            if (trackingContent.trim()) {
              const lines = trackingContent.split("\n");
              lines.forEach(line => {
                const weekMatch = line.match(/Week Total Points:\s*(\d+)/i);
                if (weekMatch) parsedStats.week = parseInt(weekMatch[1]) || 0;

                const monthMatch = line.match(/Month Total Points:\s*(\d+)/i);
                if (monthMatch) parsedStats.month = parseInt(monthMatch[1]) || 0;

                const allTimeMatch = line.match(/AllTime Total Points:\s*(\d+)/i);
                if (allTimeMatch) parsedStats.allTime = parseInt(allTimeMatch[1]) || 0;

                // Match format: YYYY/MM/DD At HH:MM (+x%)
                const logMatch = line.match(/^\s*•\s*(\d{4})\/(\d{2})\/(\d{2})\s+At\s+(\d{2}):(\d{2})\s+\((\+|-)?(\d+)%\)/i);
                if (logMatch) {
                  const [_, yyyy, mm, dd, hh, min, sign, deltaStr] = logMatch;
                  const timestamp = new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(dd), parseInt(hh), parseInt(min)).getTime();
                  const delta = parseInt(deltaStr) || 0;
                  if (!isNaN(timestamp)) {
                    parsedTodayLogs.push({ timestamp, delta });
                  }
                }
              });
            } else {
              parsedStats = currentState.staticStats || { week: 0, month: 0, allTime: 0 };
              parsedTodayLogs = currentState.todayPercentageLogs || [];
            }

            return { folders: newFolders, paragraphs: newParagraphs, staticStats: parsedStats, todayPercentageLogs: parsedTodayLogs };
          };

          // Integrated State Modifier with Undo/Redo tracking for stats
          const updateDocState = (newFolders, newParagraphs, customStats = null, customLogs = null, isContinuous = false) => {
            const now = Date.now();
            const nextStats = customStats || docState.staticStats;
            const nextLogs = customLogs || docState.todayPercentageLogs;

            const nextFullState = { 
              folders: newFolders, 
              paragraphs: newParagraphs, 
              staticStats: nextStats, 
              todayPercentageLogs: nextLogs 
            };

            if (isContinuous && (now - lastHistorySaveTime.current < 1000)) {
                setDocState(nextFullState);
            } else {
                setUndoStack(prev => [...prev, docState]);
                setRedoStack([]); 
                setDocState(nextFullState);
                lastHistorySaveTime.current = now;
            }
          };

          const undo = useCallback(() => {
            if (undoStack.length === 0) return;
            const previousState = undoStack[undoStack.length - 1];
            setRedoStack(prev => [...prev, docState]);
            setDocState(previousState);
            setUndoStack(prev => prev.slice(0, -1));
          }, [docState, undoStack]);

          const redo = useCallback(() => {
            if (redoStack.length === 0) return;
            const nextState = redoStack[redoStack.length - 1];
            setUndoStack(prev => [...prev, docState]);
            setDocState(nextState);
            setRedoStack(prev => prev.slice(0, -1));
          }, [docState, redoStack]);

          // App Data Text Change Sync (Blur)
          const handleReadableTextBlur = () => {
            try {
              const { folders: parsedF, paragraphs: parsedP, staticStats: parsedS, todayPercentageLogs: parsedTL } = parseTextToState(readableText, docState);
              if (parsedF.length > 0 || parsedP.length > 0) {
                updateDocState(parsedF, parsedP, parsedS, parsedTL);
              }
            } catch (e) { 
              console.error("Text parsing failed, ignoring changes."); 
            }
          };

          const switchTab = (tabName) => {
              if (activeTab === 'readable' && tabName !== 'readable') {
                  handleReadableTextBlur();
              }
              setActiveTab(tabName);
          };

          // Keyboard Shortcuts
          useEffect(() => {
            const handleKeyDown = (e) => {
              if (e.ctrlKey && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
              if (e.ctrlKey && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
              if (e.key === 'Tab') {
                const target = e.target;
                const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
                if (!isInput) {
                    e.preventDefault();
                    setSelectedFolderId(prev => prev === 'overview' ? (lastActiveFolderId || '1') : 'overview');
                }
              }
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [undo, redo, selectedFolderId, lastActiveFolderId]);

          // Keep LocalStorage Sync
          useEffect(() => {
            localStorage.setItem('env_folders', JSON.stringify(folders));
            localStorage.setItem('env_paragraphs', JSON.stringify(paragraphs));
            localStorage.setItem('env_static_percentages', JSON.stringify(staticStats));
            localStorage.setItem('env_today_percentage_logs', JSON.stringify(todayPercentageLogs));
          }, [folders, paragraphs, staticStats, todayPercentageLogs]);
          
          // Force UI to sync when Undo/Redo happens in App Data Tab
          useEffect(() => {
            if (activeTab === 'readable') {
              setReadableText(generateReadableText(folders, paragraphs, staticStats, todayPercentageLogs));
            }
          }, [folders, paragraphs, staticStats, todayPercentageLogs, activeTab]);

          // Scroll to highlighted paragraph
          useEffect(() => {
            if (highlightParaId && selectedFolderId !== 'overview' && activeTab === 'editor') {
              const el = document.getElementById(`para-container-${highlightParaId}`);
              if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                const timer = setTimeout(() => setHighlightParaId(null), 1500);
                return () => clearTimeout(timer);
              }
            }
          }, [highlightParaId, selectedFolderId, activeTab]);

          // Global Click Listeners for Context & Floating Menus
          useEffect(() => {
            const handleWindowClick = (e) => {
                setContextMenu(prev => ({ ...prev, visible: false }));
                if (!e.target.closest('#selection-toolbar')) {
                    const sel = window.getSelection();
                    if (!sel || sel.isCollapsed) {
                      setSelectionMenu(prev => ({...prev, visible: false}));
                    }
                }
            };
            window.addEventListener('click', handleWindowClick);
            return () => window.removeEventListener('click', handleWindowClick);
          }, []);

          // Safe percentage change logging directly connected to undo history
          const logAndGetUpdatedStats = useCallback((oldHtml, newHtml) => {
            const oldPct = calcPct(oldHtml);
            const newPct = calcPct(newHtml);
            const delta = newPct - oldPct;

            if (delta > 0) {
                // Today logs track each percentage change with date and time
                const updatedLogs = [...todayPercentageLogs, { timestamp: Date.now(), delta }];
                
                // Other stats (week, month, allTime) saved as single numbers that keep updating
                const updatedStats = {
                    week: (staticStats.week || 0) + delta,
                    month: (staticStats.month || 0) + delta,
                    allTime: (staticStats.allTime || 0) + delta
                };
                return { updatedLogs, updatedStats };
            }
            return { updatedLogs: todayPercentageLogs, updatedStats: staticStats };
          }, [todayPercentageLogs, staticStats]);

          // Folder Rating Logic
          const changeFolderRating = useCallback((folderId, valueOrFn, isContinuous = false) => {
            setDocState(prevState => {
                const folder = prevState.folders.find(f => f.id === folderId);
                const oldRating = folder ? (folder.rating || 0) : 0;
                
                let targetRating;
                if (typeof valueOrFn === 'function') targetRating = valueOrFn(oldRating);
                else targetRating = Number(valueOrFn) || 0;
                
                let num = Math.min(100, Math.max(0, targetRating));
                const delta = num - oldRating;

                if (delta === 0) return prevState;

                // Fix: Disconnected folder rating updates from todayPercentageLogs & staticStats completely.
                const nextLogs = prevState.todayPercentageLogs;
                const nextStats = prevState.staticStats;

                const newFolders = prevState.folders.map(f => f.id === folderId ? { ...f, rating: num } : f);
                
                const now = Date.now();
                if (!(isContinuous && (now - lastHistorySaveTime.current < 1000))) {
                    setUndoStack(prevStack => [...prevStack, prevState]);
                    setRedoStack([]);
                    lastHistorySaveTime.current = now;
                }

                return { 
                  folders: newFolders, 
                  paragraphs: prevState.paragraphs,
                  staticStats: nextStats,
                  todayPercentageLogs: nextLogs
                };
            });
          }, []);

          // Mouse Wheel Handlers (Percentages)
          useEffect(() => {
            const sidebarElement = sidebarListRef.current;
            if (!sidebarElement) return;
            const handleSidebarWheel = (e) => {
              if (selectedFolderId === 'overview') return;

              if (target) {
                e.preventDefault();

            sidebarElement.addEventListener('wheel', handleSidebarWheel, { passive: false });

          useEffect(() => {

            };
            sliderElement.addEventListener('wheel', handleHeaderSliderWheel, { passive: false });

          // Component State Modifiers
          const addFolder = () => {

            setSelectedFolderId(newId);

          const deleteFolder = (folderId, e) => {

            updateDocState(folders.filter(f => f.id !== folderId), paragraphs.filter(p => p.folderId !== folderId));

                const fallbackId = folders.find(f => f.id !== folderId)?.id || null;

                setLastActiveFolderId(fallbackId);

                setExcludedOverviewFolders(nextExcluded);
            }
          };

          const moveFolder = (folderId, direction) => {
            const idx = folders.findIndex(f => f.id === folderId);
            if (idx < 0) return;
            const newIdx = idx + direction;
            if (newIdx < 0 || newIdx >= folders.length) return;
            const newFolders = [...folders];
            const temp = newFolders[idx];
            newFolders[idx] = newFolders[newIdx];
            newFolders[newIdx] = temp;
            updateDocState(newFolders, paragraphs);
          };

          const handleSaveFolderName = (folderId) => {
            if (tempFolderName.trim()) {
              updateDocState(folders.map(f => f.id === folderId ? { ...f, name: tempFolderName.trim() } : f), paragraphs);
            }
            setEditingFolderId(null);
          };

          const mergeFolders = (sourceId, targetId) => {
            if (!targetId || sourceId === targetId) return;
            updateDocState(
              folders.filter(f => f.id !== sourceId),
              paragraphs.map(p => p.folderId === sourceId ? { ...p, folderId: targetId } : p)
            );
            if (selectedFolderId === sourceId) {
                setSelectedFolderId(targetId);
                setLastActiveFolderId(targetId);
            }
            setMergeTargetId('');
          };

          const addParagraph = () => {
            if ((!newParagraphText.trim() && !newParagraphTextBack.trim()) || !selectedFolderId || selectedFolderId === 'overview') return;
            
            const processedFront = applyShortcuts(newParagraphText.trim());
            const processedBack = applyShortcuts(newParagraphTextBack.trim());
            
            // Only front side highlights are allowed to trigger logs
            const { updatedLogs, updatedStats } = logAndGetUpdatedStats("", processedFront);

            updateDocState(folders, [...paragraphs, {
              id: generateId(),
              folderId: selectedFolderId,
              text: processedFront,
              textBack: processedBack,
              createdAt: Date.now(),
              archived: false,
              studyCount: 0,
              lastStudied: null
            }], updatedStats, updatedLogs);
            setNewParagraphText('');
            setNewParagraphTextBack('');
            setIsAddingBack(false);
          };

          const startEditing = (para) => {
            setEditingParagraphId(para.id);
            setEditingText(para.text);
            setEditingTextBack(para.textBack || '');
            setEditingSide('front');
          };

          const saveEditing = (paraId) => {
            const oldPara = paragraphs.find(p => p.id === paraId);
            if (!oldPara) return;

            const editDiv = document.getElementById(`edit-para-${paraId}`);
            let currentEditText = editDiv ? editDiv.innerHTML : (editingSide === 'front' ? editingText : editingTextBack);
            currentEditText = applyShortcuts(currentEditText);
            
            const finalFront = editingSide === 'front' ? currentEditText : editingText;
            const finalBack = editingSide === 'back' ? currentEditText : editingTextBack;
            
            if (!finalFront.trim() && !finalBack.trim()) return;
            
            // Only evaluate highlights for the front side
            const { updatedLogs, updatedStats } = logAndGetUpdatedStats(oldPara.text, finalFront);

            updateDocState(folders, paragraphs.map(p => p.id === paraId ? { ...p, text: finalFront, textBack: finalBack } : p), updatedStats, updatedLogs);
            setEditingParagraphId(null);
            setEditingText('');
            setEditingTextBack('');
          };

          const deleteParagraph = (paraId) => updateDocState(folders, paragraphs.filter(p => p.id !== paraId));
          const toggleArchive = (paraId) => updateDocState(folders, paragraphs.map(p => p.id === paraId ? { ...p, archived: !p.archived } : p));
          const toggleFlipCard = (paraId) => setFlippedParas(prev => { const n = new Set(prev); if (n.has(paraId)) n.delete(paraId); else n.add(paraId); return n; });
          
          const markFullyStudied = (paraId) => {
            const para = paragraphs.find(p => p.id === paraId);
            if (!para || isStudyGated(para)) return;
            
            const { chars: charsF, styles: stylesF } = parseHtmlToStyles(para.text);
            const newStylesF = stylesF.map(s => s === 'green' ? 'neutral' : s);
            const newHtmlF = rebuildHtml(charsF, newStylesF);

            const { chars: charsB, styles: stylesB } = parseHtmlToStyles(para.textBack);
            const newStylesB = stylesB.map(s => s === 'green' ? 'neutral' : s);
            const newHtmlB = rebuildHtml(charsB, newStylesB);

            // Backside is not highlightable/savable in ratings, so logs only track front-side reductions
            const { updatedLogs, updatedStats } = logAndGetUpdatedStats(para.text, newHtmlF);

            updateDocState(folders, paragraphs.map(p => p.id === paraId ? {
               ...p,
               text: newHtmlF,
               textBack: newHtmlB,
               studyCount: (p.studyCount || 0) + 1,
               lastStudied: Date.now()
            } : p), updatedStats, updatedLogs);
          };

          const moveParagraph = (paraId, direction) => {
            const folderParas = paragraphs.filter(p => p.folderId === selectedFolderId);
            let visualList = folderParas.slice().sort((a, b) => {
              if (a.archived !== b.archived) return a.archived ? 1 : -1;
              const aGated = isStudyGated(a);
              const bGated = isStudyGated(b);
              if (aGated !== bGated) return aGated ? 1 : -1;
              return 0;
            });
            if (!showArchived) visualList = visualList.filter(p => !p.archived);

            const idx = visualList.findIndex(p => p.id === paraId);
            if (idx < 0) return;
            const targetIdx = idx + direction;
            if (targetIdx < 0 || targetIdx >= visualList.length) return;

            const targetParaId = visualList[targetIdx].id;
            const idx1 = paragraphs.findIndex(p => p.id === paraId);
            const idx2 = paragraphs.findIndex(p => p.id === targetParaId);

            const newParagraphs = [...paragraphs];
            const temp = newParagraphs[idx1];
            newParagraphs[idx1] = newParagraphs[idx2];
            newParagraphs[idx2] = temp;

            updateDocState(folders, newParagraphs);
          };

          const handleFolderClick = (folderId, e) => {
            if (isOverviewMode) {
              toggleOverviewExclude(folderId, e);
            } else if (selectedFolderId === folderId) {
              if (activeTab === 'readable') {
                  switchTab('editor');
              } else {
                  e.stopPropagation();
                  setEditingFolderId(folderId);
                  const folder = folders.find(f => f.id === folderId);
                  if (folder) setTempFolderName(folder.name);
              }
            } else {
              setSelectedFolderId(folderId);
              setLastActiveFolderId(folderId);
              switchTab('editor');
            }
            setIsMobileMenuOpen(false);
          };

          const toggleOverviewExclude = (folderId, e) => {
            e.stopPropagation();
            setExcludedOverviewFolders(prev => {
                const next = new Set(prev);
                if (next.has(folderId)) next.delete(folderId);
                else next.add(folderId);
                return next;
            });
          };

          // Precise Character Offset Range selection calculation (relative to container text)
          const getSelectionOffsets = (container) => {
            const selection = window.getSelection();
            if (!selection || selection.rangeCount === 0) return null;
            const range = selection.getRangeAt(0);
            
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(container);
            preCaretRange.setEnd(range.startContainer, range.startOffset);
            const start = preCaretRange.toString().length;
            
            const end = start + range.toString().length;
            return { start, end };
          };

          const handleTextSelection = (e, paraId, isFlipped) => {
            // Requirement 2: Disable highlight selection for the backside
            if (isFlipped) return;

            const para = paragraphs.find(p => p.id === paraId);
            if (!para || isStudyGated(para)) return; 

            const container = document.getElementById(`para-content-${paraId}`);
            if (!container) return;

            const selection = window.getSelection();
            if (selection && !selection.isCollapsed && selection.toString().trim() !== "") {
                const offsets = getSelectionOffsets(container);
                if (!offsets) return;

                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();

                const { styles } = parseHtmlToStyles(para.text);
                const selectedStyles = styles.slice(offsets.start, offsets.end);
                const hasHighlights = selectedStyles.includes('red') || selectedStyles.includes('green');

                setSelectionMenu({
                    visible: true,
                    x: rect.left + rect.width / 2,
                    y: rect.top - 40 + window.scrollY,
                    paraId: paraId,
                    start: offsets.start,
                    end: offsets.end,
                    showRemove: hasHighlights,
                    styleContext: null,
                    isFlipped: false
                });
            } else {
                setSelectionMenu(prev => ({...prev, visible: false}));
            }
          };

          const handleHighlightSpanClick = (e, paraId, isFlipped) => {
            // Requirement 2: Do not allow click to edit highlights on the backside
            if (isFlipped) return;

            const para = paragraphs.find(p => p.id === paraId);
            if (!para || isStudyGated(para)) return; 

            const clickedSpan = e.target.closest('span.bg-red-200, span.bg-green-200');
            if (!clickedSpan) return;
            
            const selection = window.getSelection();
            if (selection && !selection.isCollapsed) return; 
            
            e.stopPropagation();
            const container = document.getElementById(`para-content-${paraId}`);
            if (!container) return;

            const preRange = document.createRange();
            preRange.selectNodeContents(container);
            preRange.setEndBefore(clickedSpan);
            const start = preRange.toString().length;
            const end = start + clickedSpan.textContent.length;

            const rect = clickedSpan.getBoundingClientRect();
            const isRed = clickedSpan.className.includes('bg-red-200');

            setSelectionMenu({
              visible: true,
              x: rect.left + rect.width / 2,
              y: rect.top - 45 + window.scrollY,
              paraId: paraId,
              start: start,
              end: end,
              showRemove: true,
              styleContext: isRed ? 'red' : 'green',
              isFlipped: false
            });
          };

          const applyHighlight = (styleType) => {
            const { paraId, start, end } = selectionMenu;
            const para = paragraphs.find(p => p.id === paraId);
            if (!para || isStudyGated(para)) return;

            const currentStr = para.text;
            const { chars, styles } = parseHtmlToStyles(currentStr);
            
            for (let i = start; i < end; i++) {
              if (i >= 0 && i < styles.length) styles[i] = styleType;
            }

            const newHtml = rebuildHtml(chars, styles);
            const { updatedLogs, updatedStats } = logAndGetUpdatedStats(currentStr, newHtml);

            updateDocState(folders, paragraphs.map(p => {
                if (p.id !== paraId) return p;
                return { ...p, text: newHtml };
            }), updatedStats, updatedLogs);
            
            window.getSelection().removeAllRanges();
            setSelectionMenu(prev => ({...prev, visible: false}));
          };

          const handleCopyToClipboard = () => {
            if (textAreaRef.current) {
              textAreaRef.current.select();
              try { document.execCommand('copy'); setCopySuccess(true); setTimeout(() => setCopySuccess(false), 2000); } 
              catch (err) { console.error("Failed to copy", err); }
            }
          };

          const handlePasteAll = async () => {
            try {
                let pastedText = await navigator.clipboard.readText();
                if (pastedText) {
                    const { folders: parsedF, paragraphs: parsedP, staticStats: parsedS, todayPercentageLogs: parsedTL } = parseTextToState(pastedText, docState);
                    if (parsedF.length > 0 || parsedP.length > 0) {
                        updateDocState(parsedF, parsedP, parsedS, parsedTL);
                        setReadableText(generateReadableText(parsedF, parsedP, parsedS, parsedTL));
                    }
                }
            } catch (err) {
                const pastedText = prompt("Paste your App Data here:");
                if (pastedText) {
                    const { folders: parsedF, paragraphs: parsedP, staticStats: parsedS, todayPercentageLogs: parsedTL } = parseTextToState(pastedText, docState);
                    if (parsedF.length > 0 || parsedP.length > 0) {
                        updateDocState(parsedF, parsedP, parsedS, parsedTL);
                        setReadableText(generateReadableText(parsedF, parsedP, parsedS, parsedTL));
                    }
                }
            }
          };

          const triggerContextMenu = (e, type, targetId = null) => {
            if (e.target.closest('input') || e.target.closest('textarea') || e.target.isContentEditable) return;
            e.preventDefault(); e.stopPropagation();
            setSelectionMenu(prev => ({ ...prev, visible: false }));
            setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type, targetId });
          };

          const handleGlobalContextMenu = (e) => {
            if (e.target.closest('input') || e.target.closest('textarea') || e.target.isContentEditable) return;
            e.preventDefault();
            setContextMenu({ visible: true, x: e.clientX, y: e.clientY, type: 'default', targetId: null });
          };

          const handleStartRatingEdit = (e, folder) => {
            e.stopPropagation(); setEditingRatingFolderId(folder.id); setTempRatingFolderVal(String(folder.rating || 0));
          };
          const handleSaveRatingEdit = (folderId) => { changeFolderRating(folderId, tempRatingVal); setEditingRatingFolderId(null); };

          const isOverviewMode = selectedFolderId === 'overview';
          const currentFolder = isOverviewMode ? null : folders.find(f => f.id === selectedFolderId);
          
          let folderParagraphs = paragraphs.filter(p => p.folderId === selectedFolderId);
          folderParagraphs.sort((a, b) => {
              if (a.archived !== b.archived) return a.archived ? 1 : -1;
              const aGated = isStudyGated(a);
              const bGated = isStudyGated(b);
              if (aGated !== bGated) return aGated ? 1 : -1;
              return 0;
          });

          if (!showArchived) folderParagraphs = folderParagraphs.filter(p => !p.archived);

          const filteredParagraphs = searchQuery 
            ? folderParagraphs.filter(p => p.text.toLowerCase().includes(searchQuery.toLowerCase()) || (p.textBack || '').toLowerCase().includes(searchQuery.toLowerCase()))
            : folderParagraphs;

          // Compute Overview Data
          let overviewData = {
              today: [], week: [], month: [], older: [],
              study0: [], study1: [], study2: [], study3: [], study4: [], study5plus: []
          };
          
          // Study readiness maps
          let studyReadiness = {
              now: [],
              in1Day: [],
              in2To3Days: [],
              in4To6Days: [],
              in7PlusDays: []
          };
          let archivedParas = [];
          
          // Compute "Today" growth live from undo/redo-bound logs
          let growthData = { today: 0, week: staticStats?.week || 0, month: staticStats?.month || 0, allTime: staticStats?.allTime || 0 };

          if (isOverviewMode) {
              const overviewParas = paragraphs.filter(p => {
                  return !excludedOverviewFolders.has(p.folderId);
              });

              const todayStart = new Date();
              todayStart.setHours(0, 0, 0, 0);
              const tsToday = todayStart.getTime();
              const tsWeek = tsToday - (7 * 24 * 60 * 60 * 1000);
              const tsMonth = tsToday - (30 * 24 * 60 * 60 * 1000);

              overviewParas.forEach(p => {
                  // Standard workspace statistics calculations
                  if (!p.archived || showArchived) {
                      const latestDate = Math.max(p.createdAt, p.lastStudied || 0);
                      if (latestDate >= tsToday) overviewData.today.push(p);
                      else if (latestDate >= tsWeek) overviewData.week.push(p);
                      else if (latestDate >= tsMonth) overviewData.month.push(p);
                      else overviewData.older.push(p);
                      
                      const c = p.studyCount || 0;
                      if (c === 0) overviewData.study0.push(p);
                      else if (c === 1) overviewData.study1.push(p);
                      else if (c === 2) overviewData.study2.push(p);
                      else if (c === 3) overviewData.study3.push(p);
                      else if (c === 4) overviewData.study4.push(p);
                      else overviewData.study5plus.push(p);
                  }

                  // Timeline & Archived categorizations
                  if (p.archived) {
                      archivedParas.push(p);
                  } else {
                      // Check cooldown limits to compute readiness categories
                      const elapsed = p.lastStudied ? (Date.now() - p.lastStudied) : null;
                      const currentCount = p.studyCount || 0;
                      let cooldown = 0;
                      if (currentCount === 1 || currentCount === 2) cooldown = 7.5 * 24 * 60 * 60 * 1000;
                      else if (currentCount === 3) cooldown = 15 * 24 * 60 * 60 * 1000;
                      else if (currentCount >= 4) cooldown = 30 * 24 * 60 * 60 * 1000;

                      if (!p.lastStudied || elapsed >= cooldown) {
                          studyReadiness.now.push(p);
                      } else {
                          const remaining = cooldown - elapsed;
                          const oneDay = 24 * 60 * 60 * 1000;
                          if (remaining <= oneDay) {
                              studyReadiness.in1Day.push(p);
                          } else if (remaining <= 3 * oneDay) {
                              studyReadiness.in2To3Days.push(p);
                          } else if (remaining <= 6 * oneDay) {
                              studyReadiness.in4To6Days.push(p);
                          } else {
                              studyReadiness.in7PlusDays.push(p);
                          }
                      }
                  }
              });
              
              // Only live-calculate "Today" logs so they can be undone & redone seamlessly.
              if (todayPercentageLogs && todayPercentageLogs.length > 0) {
                todayPercentageLogs.forEach(log => {
                  if (log.timestamp >= tsToday) {
                    growthData.today += log.delta;
                  }
                });
              }
          }

          return (
            <div 
              className="flex h-screen bg-slate-50 text-slate-800 font-sans overflow-hidden"
              onContextMenu={handleGlobalContextMenu}
            >
              
              {isMobileMenuOpen && (
                  <div className="fixed inset-0 bg-slate-900/50 z-30 md:hidden" onClick={() => setIsMobileMenuOpen(false)} />
              )}

              {/* Sidebar: Navigation */}
              <aside className={`fixed md:relative inset-y-0 left-0 z-40 w-4/5 max-w-sm md:max-w-none md:w-[27rem] bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 transform transition-transform duration-200 ease-in-out ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                {/* Create Folder Input */}
                <div 
                  className="p-4 border-b border-slate-100 bg-slate-50/50"
                  onContextMenu={(e) => triggerContextMenu(e, 'sidebar')}
                >
                  <div className="flex gap-2">
                    <input
                      type="text" 
                      placeholder="New folder name..." 
                      value={newFolderName} 
                      onChange={(e) => setNewFolderName(e.target.value)} 
                      onKeyDown={(e) => e.key === 'Enter' && addFolder()}
                      onContextMenu={(e) => triggerContextMenu(e, 'sidebar')}
                      className="flex-1 min-w-0 px-3 py-1.5 text-sm bg-white border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500"
                    />
                    <button onClick={addFolder} className="p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-md transition-colors shadow-sm" title="Add root folder"><PlusIcon className="w-4 h-4" /></button>
                  </div>
                </div>

                {/* Folders List */}
                <div ref={sidebarListRef} className="flex-1 overflow-y-auto p-4 space-y-1" onContextMenu={(e) => triggerContextMenu(e, 'sidebar')}>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Folders</span>
                    {selectedFolderId && selectedFolderId !== 'overview' && <button onClick={() => setSelectedFolderId(null)} className="text-xs text-blue-600 hover:underline">Clear Selection</button>}
                  </div>
                  {folders.length === 0 ? (
                    <div className="text-center py-8 text-slate-400 text-sm">No folders in this environment. Create one to get started!</div>
                  ) : (
                    folders.map(folder => {
                      const isSelected = selectedFolderId === folder.id;
                      const isRatingEditing = editingRatingFolderId === folder.id;
                      const isNameEditing = editingFolderId === folder.id;
                      const isIncluded = !excludedOverviewFolders.has(folder.id);

                      return (
                        <div key={folder.id} className="select-none">
                          <div
                            onClick={(e) => handleFolderClick(folder.id, e)}
                            onContextMenu={(e) => triggerContextMenu(e, 'folder', folder.id)}
                            className={`group flex items-center justify-between py-2 px-2 rounded-lg cursor-pointer transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-700 hover:bg-gray-50'}`}
                          >
                            <div className="flex items-center space-x-2 min-w-0 flex-1">
                              {isOverviewMode ? (
                                <input type="checkbox" checked={isIncluded} readOnly className="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" />
                              ) : (
                                <FolderIcon className={`w-4 h-4 flex-shrink-0 ${isSelected ? 'text-blue-500' : 'text-gray-400'}`} />
                              )}
                              
                              {isNameEditing ? (
                                <input type="text" value={tempFolderName} onClick={(e) => e.stopPropagation()} onChange={(e) => setTempFolderName(e.target.value)} onBlur={() => handleSaveFolderName(folder.id)} onKeyDown={(e) => { if (e.key === 'Enter') handleSaveFolderName(folder.id); if (e.key === 'Escape') setEditingFolderId(null); }} autoFocus className="w-full px-1 text-xs border border-blue-400 rounded text-slate-800 outline-none" />
                              ) : (
                                <span className="truncate text-base cursor-pointer" title={`${folder.name}`}>{folder.name}</span>
                              )}
                            </div>
                            
                            {!isOverviewMode && (
                                <div className="flex items-center space-x-1.5 flex-shrink-0 ml-auto pl-2" data-wheel-folder-id={folder.id}>
                                {isRatingEditing ? (
                                    <input type="number" min="0" max="100" value={tempRatingVal} onClick={(e) => e.stopPropagation()} onChange={(e) => setTempRatingFolderVal(e.target.value)} onBlur={() => handleSaveRatingEdit(folder.id)} onKeyDown={(e) => { if (e.key === 'Enter') handleSaveRatingEdit(folder.id); if (e.key === 'Escape') setEditingRatingFolderId(null); }} autoFocus className="w-12 px-1 text-xs border border-blue-400 rounded text-slate-800 text-center font-normal outline-none focus:ring-1 focus:ring-blue-400" />
                                ) : (
                                    <span onClick={(e) => handleStartRatingEdit(e, folder)} className="text-sm text-slate-400 font-normal hover:text-blue-600 hover:underline cursor-pointer transition">({folder.rating || 0}%)</span>
                                )}
                                <button onClick={(e) => deleteFolder(folder.id, e)} className="opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 rounded transition-all" title="Delete folder and contents"><TrashIcon className="w-3.5 h-3.5" /></button>
                                </div>
                            )}
                          </div>
                        </div>
                      );
                    })
                  )}
                </div>
                
                <div className="p-4 border-t border-slate-200 bg-slate-50">
                    <button 
                        onClick={() => {
                          if (isOverviewMode) {
                            setSelectedFolderId(lastActiveFolderId || '1');
                          } else {
                            if (selectedFolderId && selectedFolderId !== 'overview') {
                              setLastActiveFolderId(selectedFolderId);
                            }
                            setSelectedFolderId('overview');
                          }
                          setIsMobileMenuOpen(false);
                        }}
                        className={`w-full py-2.5 rounded-lg flex justify-center items-center gap-2 font-medium transition-colors ${isOverviewMode ? 'bg-indigo-100 text-indigo-700 shadow-sm border border-indigo-200' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}
                    >
                        <OverviewIcon className="w-4 h-4" />
                        Informational Overview (tab)
                    </button>
                </div>
              </aside>

              {/* Main Content Area */}
              <main className="flex-1 flex flex-col h-full bg-slate-50 min-w-0">
                <header className="bg-white border-b border-slate-200 px-4 md:px-6 flex items-center flex-shrink-0" onContextMenu={(e) => triggerContextMenu(e, 'header')}>

                    </div>
                    
                    {!isOverviewMode && (

                          <button onClick={redo} disabled={redoStack.length === 0} className="px-2 py-1.5 text-slate-400 hover:text-indigo-600 disabled:opacity-40 disabled:hover:text-slate-400 transition cursor-pointer border-r border-slate-200 pr-3" title="Redo Action (Ctrl+Y)"><RedoIcon /></button>
                          <button onClick={() => switchTab('editor')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-all ${activeTab === 'editor' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>Paragraph Database</button>
                          <button onClick={() => switchTab('readable')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-all ${activeTab === 'readable' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>App Data</button>

                    {currentFolder && activeTab === 'editor' && !isOverviewMode && (

                        <div className="w-px h-6 bg-slate-200 hidden sm:block"></div>
                        <div ref={headerSliderRef} className="flex items-center gap-2 bg-slate-50 px-2 py-1.5 rounded-md border border-slate-200" title="Scroll mouse wheel here to tune by 1%">
                          <span className="text-xs text-slate-500 font-medium w-8 text-right">{currentFolder.rating || 0}%</span>
                          <input type="range" min="0" max="100" value={currentFolder.rating || 0} onChange={(e) => changeFolderRating(currentFolder.id, e.target.value, true)} className="w-20 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                        <select value={mergeTargetId} onChange={(e) => mergeFolders(currentFolder.id, e.target.value)} className="text-xs px-2 py-1.5 bg-white border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500/20">
                          <option value="">Merge into...</option>
                          {folders.filter(f => f.id !== currentFolder.id).map(f => (<option key={f.id} value={f.id}>{f.name}</option>))}
