                        <label className="flex items-center gap-1.5 cursor-pointer select-none">
                          <input type="checkbox" checked={showArchived} onChange={(e) => setShowArchived(e.target.checked)} className="rounded border-slate-300 text-blue-600 focus:ring-blue-500 h-3.5 w-3.5" />
                          <span className="text-xs text-slate-600 whitespace-nowrap">Archived</span>
                        </label>
                        <label className="flex items-center gap-1.5 cursor-pointer select-none">
                          <input type="checkbox" checked={showPercentages} onChange={(e) => setShowPercentages(e.target.checked)} className="rounded border-slate-300 text-blue-600 focus:ring-blue-500 h-3.5 w-3.5" />
                          <span className="text-xs text-slate-600 whitespace-nowrap">Show Percentages</span>
                        </label>
                        <div className="relative w-40 sm:w-48">
                          <input type="text" placeholder="Search..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-8 pr-4 py-1.5 text-sm bg-slate-50 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500/20" />
                          <span className="absolute left-2.5 top-2.5 text-slate-400"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></span>
                        </div>
                      </div>
                    )}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 md:p-6" onContextMenu={(e) => { if (currentFolder) triggerContextMenu(e, 'main'); }}>
                  {isOverviewMode ? (
                      <div className="max-w-4xl mx-auto mt-4 md:mt-10 space-y-8 pb-20">
                          
                          {/* Unclipped boxes without overflow-hidden */}
                          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 relative">
                              <div className="bg-blue-50 border-b border-blue-100 p-4 md:p-6 flex items-center gap-4 rounded-t-2xl">
                                  <div className="p-3 bg-blue-100 text-blue-600 rounded-xl shrink-0">
                                      <svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                                  </div>
                                  <div className="flex items-center gap-2">
                                      <div>
                                          <h3 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center">
                                            Progress Growth
                                            <div className="relative group inline-block ml-2 cursor-pointer z-[100]">
                                              <InfoIcon className="w-5 h-5 text-blue-500 hover:text-blue-700" />
                                              <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 w-64 p-3 bg-slate-900 text-slate-200 text-xs rounded-xl shadow-xl hidden group-hover:block pointer-events-none text-center font-normal">
                                                This percentage represents active increments from your green text highlight updates. Manual folder percentage tuning has no effect on this.
                                              </div>
                                            </div>
                                          </h3>
                                          <p className="text-sm md:text-base text-slate-500 mt-1">Total percentage points gained in the app.</p>
                                      </div>
                                  </div>
                              </div>
                              <div className="p-4 md:p-6 grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                                  <div className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center">
                                      <div className="text-3xl md:text-4xl font-extrabold text-blue-600">{growthData.today}%</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">Today</div>
                                  </div>
                                  <div className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-500">{growthData.week}%</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">This Week</div>
                                  </div>
                                  <div className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center">
                                      <div className="text-3xl md:text-4xl font-extrabold text-purple-600">{growthData.month}%</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">This Month</div>
                                  </div>
                                  <div className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center">
                                      <div className="text-3xl md:text-4xl font-extrabold text-emerald-600">{growthData.allTime}%</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">All Time</div>
                                  </div>
                              </div>
                          </div>

                          {/* STUDY TIMELINES & ARCHIVED METRICS CARD */}
                          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 relative">
                              <div className="bg-emerald-50 border-b border-emerald-100 p-4 md:p-6 flex items-center gap-4 rounded-t-2xl">
                                  <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl shrink-0">
                                      <svg className="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                  </div>
                                  <div>
                                      <h3 className="text-xl md:text-2xl font-bold text-slate-900">Study Readiness & Archive Status</h3>
                                      <p className="text-sm md:text-base text-slate-500 mt-1">Review timeframes based on active spaced repetition cooldown structures.</p>
                                  </div>
                              </div>
                              <div className="p-4 md:p-6 grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                                  <div onClick={() => setStatModal({ visible: true, title: 'Study Now', paras: studyReadiness.now })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-emerald-600">{studyReadiness.now.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">Study Now</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Study in 1 Day', paras: studyReadiness.in1Day })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-blue-500">{studyReadiness.in1Day.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">In 1 Day</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Study in 2 to 3 Days', paras: studyReadiness.in2To3Days })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-500">{studyReadiness.in2To3Days.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">2 to 3 Days</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Study in 4 to 6 Days', paras: studyReadiness.in4To6Days })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-400">{studyReadiness.in4To6Days.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">4 to 6 Days</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Study in 7+ Days', paras: studyReadiness.in7PlusDays })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-slate-400">{studyReadiness.in7PlusDays.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">7+ Days</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Archived Items', paras: archivedParas })} className="bg-amber-50 rounded-xl p-4 md:p-5 border border-amber-200 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-amber-100/50 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-amber-700">{archivedParas.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">Archived</div>
                                  </div>
                              </div>
                          </div>

                          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 relative">
                              <div className="bg-indigo-50 border-b border-indigo-100 p-4 md:p-6 flex items-center gap-4 rounded-t-2xl">
                                  <div className="p-3 bg-indigo-100 text-indigo-600 rounded-xl shrink-0">
                                      <ChartIcon className="w-6 h-6 md:w-8 md:h-8" />
                                  </div>
                                  <div>
                                      <h3 className="text-xl md:text-2xl font-bold text-slate-900">Workspace Statistics</h3>
                                      <p className="text-sm md:text-base text-slate-500 mt-1">Based on "Created" or "Last Studied" activity for included folders.</p>
                                  </div>
                              </div>
                              <div className="p-4 md:p-6 grid grid-cols-2 gap-4 md:gap-6">
                                  <div onClick={() => setStatModal({ visible: true, title: 'Today', paras: overviewData.today })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-600">{overviewData.today.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">Today</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Today - This Week', paras: overviewData.week })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-blue-600">{overviewData.week.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">Today - This Week</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'This Week - This Month', paras: overviewData.month })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-emerald-600">{overviewData.month.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">This Week - This Month</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'A Month+', paras: overviewData.older })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-slate-400">{overviewData.older.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">A Month+</div>
                                  </div>
                              </div>
                          </div>

                          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 relative">
                              <div className="bg-purple-50 border-b border-purple-100 p-4 md:p-6 flex items-center gap-4 rounded-t-2xl">
                                  <div className="p-3 bg-purple-100 text-purple-600 rounded-xl shrink-0">
                                      <CheckIcon className="w-6 h-6 md:w-8 md:h-8" />
                                  </div>
                                  <div className="flex items-center gap-2">
                                      <div>
                                          <h3 className="text-xl md:text-2xl font-bold text-slate-900 flex items-center">
                                            Study Frequency
                                            <div className="relative group inline-block ml-2 cursor-pointer z-[100]">

                                              <div className="absolute left-[20%] md:left-1/2 -translate-x-1/2 bottom-full mb-2 w-64 md:w-72 p-4 bg-slate-900 text-slate-200 text-xs rounded-xl shadow-xl hidden group-hover:block pointer-events-none text-left leading-relaxed font-normal">
                                                <p className="font-bold text-indigo-400 mb-1.5">Upgrading Levels (Time Gates):</p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                  <li><strong>Level 1 → 2:</strong> Requires 1/4 month (7.5 days)</li>
                                                  <li><strong>Level 2 → 3:</strong> Requires 1/4 month (7.5 days)</li>
                                                  <li><strong>Level 3 → 4:</strong> Requires Half a month (15 days)</li>
                                                  <li><strong>Level 4 → 5:</strong> Requires 1 month (30 days)</li>
                                                </ul>
                                                <p className="mt-2 text-[10px] text-rose-300 italic font-medium border-t border-slate-800 pt-1.5">Locked paragraphs turn red, sink to the bottom, and highlights cannot be adjusted.</p>
                                              </div>
                                            </div>
                                          </h3>
                                          <p className="text-sm md:text-base text-slate-500 mt-1">Number of times paragraphs have been marked "Fully Studied".</p>
                                      </div>
                                  </div>
                              </div>
                              <div className="p-4 md:p-6 grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 0 Times', paras: overviewData.study0 })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-slate-400">{overviewData.study0.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">0 Times</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 1 Time', paras: overviewData.study1 })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-emerald-500">{overviewData.study1.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">1 Time</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 2 Times', paras: overviewData.study2 })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-emerald-600">{overviewData.study2.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">2 Times</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 3 Times', paras: overviewData.study3 })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-500">{overviewData.study3.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">3 Times</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 4 Times', paras: overviewData.study4 })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-indigo-600">{overviewData.study4.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">4 Times</div>
                                  </div>
                                  <div onClick={() => setStatModal({ visible: true, title: 'Studied 5+ Times', paras: overviewData.study5plus })} className="bg-slate-50 rounded-xl p-4 md:p-5 border border-slate-100 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-slate-100 transition-colors">
                                      <div className="text-3xl md:text-4xl font-extrabold text-purple-600">{overviewData.study5plus.length}</div>
                                      <div className="text-xs md:text-sm font-semibold text-slate-500 uppercase tracking-wide mt-2">5+ Times</div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  ) : activeTab === 'readable' ? (
                    <div className="max-w-4xl mx-auto space-y-4">
                      <div className="flex justify-between items-center flex-wrap gap-2">
                        <div>
                          {/* Replaced Header details with custom external Flashcard Data redirection button */}
                          <a 
                            href="https://docs.google.com/document/d/105Ruf6l2DXMMkcwqbax7d8ZNIa_tnMUPFIreJx_h5GQ/edit?tab=t.bt70nlh0kcqp#bookmark=id.86ditgqzxuap" 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="inline-flex items-center justify-center px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold rounded-lg text-sm transition-colors shadow-sm border border-indigo-200"
                          >
                            Flashcard Data
                          </a>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={handlePasteAll} className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm bg-white border border-slate-200 text-slate-700 hover:bg-slate-50">
                            <PasteIcon className="w-4 h-4" /> Paste All
                          </button>
                          <button onClick={handleCopyToClipboard} className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm ${copySuccess ? 'bg-emerald-600 text-white' : 'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
                            {copySuccess ? <><CheckIcon className="w-4 h-4" /> Copied!</> : <><CopyIcon className="w-4 h-4" /> Copy All</>}
                          </button>
                          <a href="https://docs.google.com/document/d/1Fn4eP4-YcuXF119SB38wigovuIIpAgUAeYYyFh1tN3I/edit?tab=t.3fk3keohztvz#bookmark=id.ks51rs9zln6r" target="_blank" rel="noopener noreferrer" className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-sm bg-indigo-600 hover:bg-indigo-700 text-white">
                            Save Data
                          </a>
                        </div>
                      </div>

                      <div className="relative bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-md">
                        <textarea ref={textAreaRef} value={readableText} onChange={(e) => setReadableText(e.target.value)} onBlur={handleReadableTextBlur} placeholder="You can type structured backups here..." className="w-full h-[65vh] bg-transparent text-slate-200 font-mono text-sm leading-relaxed focus:outline-none resize-none" />
                      </div>
                    </div>
                  ) : (
                    !currentFolder ? (
                      <div className="h-full flex flex-col items-center justify-center text-center max-w-md mx-auto">
                        <div className="p-4 bg-blue-50 rounded-full text-blue-500 mb-4"><FolderIcon className="w-8 h-8" /></div>
                        <h3 className="text-lg font-semibold text-slate-900">No Folder Selected</h3>
                        <p className="text-sm text-slate-500 mt-2">Choose a folder from the sidebar tree or create a new one to begin adding and managing your text paragraphs.</p>
                      </div>
                    ) : (
                      <div className="max-w-4xl mx-auto space-y-8">
                        
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                          <h4 className="text-base font-semibold text-slate-800 mb-3">
                            Add New Paragraph <span className="text-indigo-600 font-bold ml-1">{isAddingBack ? '(Back)' : '(Front)'}</span>
                          </h4>
                          {isAddingBack ? (
                            <textarea rows={4} placeholder="Spanish side / Back side..." value={newParagraphTextBack} onChange={(e) => setNewParagraphTextBack(e.target.value)} className="w-full px-4 py-3 text-base bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none" />
                          ) : (
                            <textarea rows={4} placeholder="Type or paste your text paragraph here... (%gtext%g to highlight green)" value={newParagraphText} onChange={(e) => setNewParagraphText(e.target.value)} className="w-full px-4 py-3 text-base bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 resize-none" />
                          )}
                          <div className="flex justify-between mt-3 items-center">
                            <button onClick={() => setIsAddingBack(!isAddingBack)} className="px-4 py-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 font-semibold rounded-md transition-colors text-sm">
                                Flip To {isAddingBack ? 'Front' : 'Back'}
                            </button>
                            <button onClick={addParagraph} disabled={(!newParagraphText.trim() && !newParagraphTextBack.trim())} className="px-5 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-bold rounded-md transition-colors flex items-center gap-1.5 shadow-sm">
                                <PlusIcon className="w-4 h-4" /> Save Paragraph
                            </button>
                          </div>
                        </div>

                        <div className="space-y-6">
                          <div className="flex items-center justify-between">
                            <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider">Paragraphs ({filteredParagraphs.length})</h3>
                          </div>

                          {filteredParagraphs.length === 0 ? (
                            <div className="bg-white rounded-xl border border-dashed border-slate-200 p-10 text-center text-slate-400 text-base">
                              <FileTextIcon className="w-10 h-10 mx-auto mb-3 text-slate-300" />
                              No paragraphs in this folder {searchQuery && 'matching your search'}. Add your first paragraph above!
                            </div>
                          ) : (
                            filteredParagraphs.map((para) => {
                              const isFlipped = flippedParas.has(para.id);
                              const displayedHtml = isFlipped ? (para.textBack || "<em class='text-slate-400'>No back side</em>") : para.text;
                              
                              const { styles } = parseHtmlToStyles(para.text);
                              const totalChars = styles.length;
                              const greenChars = styles.filter(s => s === 'green').length;
                              const greenPercentage = totalChars > 0 ? Math.round((greenChars / totalChars) * 100) : 0;
                              
                              const isHighlighted = highlightParaId === para.id;
                              const isGated = isStudyGated(para);
                              const remainingStr = getCooldownRemainingStr(para);

                              return (
                                <div 
                                  id={`para-container-${para.id}`} 
                                  key={para.id} 
                                  onContextMenu={(e) => triggerContextMenu(e, 'paragraph', para.id)} 
                                  className={`group bg-white rounded-2xl border p-6 lg:p-8 transition-all flex flex-col justify-between ${
                                    isGated 
                                      ? 'border-rose-300 bg-rose-50/40 shadow-inner' 
                                      : para.archived 
                                        ? 'border-dashed border-slate-300 bg-slate-50' 
                                        : 'border-slate-200 shadow-sm'
                                  } ${isHighlighted ? 'ring-4 ring-indigo-400 bg-indigo-50/50' : 'hover:border-blue-300'}`}
                                >
                                  {editingParagraphId === para.id ? (
                                    <div className="space-y-3">
                                      <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-bold text-slate-400 uppercase">{editingSide === 'front' ? 'Front Side' : 'Back Side'}</span>
                                      </div>
                                      
                                      {/* Restored backside/Spanish editing capability */}
                                      <div
                                          key={editingSide}
                                          id={`edit-para-${para.id}`}
                                          contentEditable={true}
                                          suppressContentEditableWarning
                                          dangerouslySetInnerHTML={{ __html: editingSide === 'front' ? editingText : editingTextBack }}
                                          className={`w-full px-4 py-3 text-lg leading-relaxed border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 min-h-[120px] ${editingSide === 'front' ? 'bg-slate-50 border-blue-400' : 'bg-slate-50 border-indigo-400'}`}
                                      />
                                      <div className="flex justify-between items-center mt-3">
                                        <button onClick={() => {
                                            const editDiv = document.getElementById(`edit-para-${para.id}`);
                                            if (editDiv) {
                                                if (editingSide === 'front') setEditingText(editDiv.innerHTML);
                                                else setEditingTextBack(editDiv.innerHTML);
                                            }
                                            setEditingSide(editingSide === 'front' ? 'back' : 'front');
                                        }} className="px-4 py-1.5 text-sm font-bold text-indigo-600 bg-indigo-50 rounded-md hover:bg-indigo-100 transition-colors">
                                            Flip To {editingSide === 'front' ? 'Back' : 'Front'}
                                        </button>
                                        <div className="flex gap-3">
                                          <button onClick={() => setEditingParagraphId(null)} className="px-4 py-1.5 text-sm font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md transition-colors">Cancel</button>
                                          <button onClick={() => saveEditing(para.id)} className="px-4 py-1.5 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-md transition-colors">Save</button>
                                        </div>
                                      </div>
                                    </div>
                                  ) : (
                                    <div>
                                      <div 
                                        id={`para-content-${para.id}`}
                                        dangerouslySetInnerHTML={{ __html: displayedHtml }}
                                        className={`text-lg leading-[1.8] whitespace-pre-wrap ${isGated || isFlipped ? 'select-none text-slate-500' : 'selection:bg-blue-200'} ${para.archived ? 'text-slate-400 line-through' : 'text-slate-800'}`}
                                        onMouseUp={(e) => !isGated && handleTextSelection(e, para.id, isFlipped)}
                                        onClick={(e) => !isGated && handleHighlightSpanClick(e, para.id, isFlipped)}
                                      />
                                      <div className="flex items-center justify-between mt-6 pt-4 border-t border-slate-100 flex-wrap gap-4">
                                        <div className="flex flex-wrap items-center gap-3 flex-1 min-w-0">
                                          <span className="inline-flex items-center px-2.5 py-1 rounded text-[11px] font-semibold bg-blue-50 text-blue-700 border border-blue-100 shadow-sm">
                                            Created: {new Date(para.createdAt).toLocaleDateString()}
                                          </span>
                                          {para.lastStudied && (
                                            <span className="inline-flex items-center px-2.5 py-1 rounded text-[11px] font-semibold bg-indigo-50 text-indigo-700 border border-indigo-100 shadow-sm">
                                              Last Studied: {new Date(para.lastStudied).toLocaleDateString()}
                                              <span className="ml-1 opacity-75">({para.studyCount})</span>
                                            </span>
                                          )}
                                          {showPercentages && (
                                            <span className="inline-flex items-center px-2.5 py-1 rounded text-[11px] font-semibold bg-emerald-50 text-emerald-700 border border-emerald-100 shadow-sm cursor-default" title="This is the percentage of this paragraph block that is highlighted green.">
                                              <InfoIcon className="w-3 h-3 mr-1" />
                                              {greenPercentage}%
                                            </span>
                                          )}
                                          {isGated && (
                                            <span className="inline-flex items-center px-2.5 py-1 rounded text-[11px] font-semibold bg-rose-100 text-rose-700 border border-rose-200 shadow-sm animate-pulse">
                                              <LockIcon className="w-3.5 h-3.5 mr-1" />
                                              Gated ({remainingStr || 'Cooldown active'})
                                            </span>
                                          )}
                                          {para.archived && <span className="inline-flex items-center px-2.5 py-1 rounded text-[11px] font-semibold bg-amber-50 text-amber-700 border border-amber-100 shadow-sm">Archived</span>}
                                        </div>
                                        
                                        {/* Action Buttons: Updated to allow horizontal scroll & prevent ever wrapping or shrinking */}
                                        <div className="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 ml-auto overflow-x-auto whitespace-nowrap flex-nowrap max-w-full sm:max-w-md lg:max-w-lg pb-1 scrollbar-thin">
                                          <button 
                                            onClick={() => markFullyStudied(para.id)} 
                                            disabled={isGated}
                                            className={`flex-shrink-0 px-3 py-1 text-xs font-bold rounded transition-colors shadow ${
                                              isGated 
                                                ? 'bg-slate-200 text-slate-400 cursor-not-allowed border border-slate-300 shadow-none' 
                                                : 'bg-indigo-500 hover:bg-indigo-600 text-white'
                                            }`} 
                                            title={isGated ? "Cooldown locked" : "Mark as studied and reset green highlights"}
                                          >
                                            {isGated ? 'Locked' : 'Fully Studied'}
                                          </button>
                                          <button onClick={() => toggleArchive(para.id)} className="flex-shrink-0 px-3 py-1 text-xs font-semibold text-amber-600 hover:bg-amber-50 rounded transition-colors" title={para.archived ? "Restore text" : "Archive text"}>{para.archived ? "Restore" : "Archive"}</button>
                                          
                                          <button onClick={() => toggleFlipCard(para.id)} className="flex-shrink-0 px-3 py-1 text-xs font-semibold text-indigo-600 hover:bg-indigo-50 rounded transition-colors border border-indigo-100 bg-white" title="Flip to front/back">Flip Card</button>

                                          <button onClick={() => startEditing(para)} className="flex-shrink-0 px-3 py-1 text-xs font-semibold text-blue-600 hover:bg-blue-50 rounded transition-colors" title="Edit text">Edit</button>
                                          <button onClick={() => deleteParagraph(para.id)} className="flex-shrink-0 p-1.5 text-slate-400 hover:text-red-500 rounded transition-colors" title="Delete text"><TrashIcon className="w-4 h-4" /></button>
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })
                          )}
                        </div>

                      </div>
                    )
                  )}
                </div>
              </main>

              {/* Floating Fixed Button */}
              <a 
                href="https://docs.google.com/document/d/1cdXb89j0-RPMXlgnJ2jzhcuV7nFgZgywY0J2DYdD-Xo/edit?tab=t.ir4nvl4ib308#bookmark=kix.vi11k62sp4a2" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="fixed bottom-4 right-4 md:bottom-6 md:right-6 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 md:px-5 md:py-3 rounded-full shadow-xl font-bold text-xs md:text-sm transition-transform hover:scale-105 z-50 flex items-center gap-2 border border-indigo-500"
              >
                Update Notes
              </a>

              {/* Floating Selection Highlighting Tool */}
              {selectionMenu.visible && !selectionMenu.isFlipped && (
                <div 
                  id="selection-toolbar"
                  className="fixed flex gap-2 bg-slate-850 bg-slate-900 p-2 rounded-lg shadow-xl z-[9999] transform -translate-x-1/2 before:content-[''] before:absolute before:top-full before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-slate-900"
                  style={{ top: selectionMenu.y, left: selectionMenu.x }}
                >
                  {(selectionMenu.styleContext === null || selectionMenu.styleContext === 'red' || selectionMenu.showRemove) && (
                    <button onClick={() => applyHighlight('green')} className="px-3 py-1.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold rounded shadow transition">Good With</button>
                  )}
                  {(selectionMenu.styleContext === null || selectionMenu.styleContext === 'green' || selectionMenu.showRemove) && (
                    <button onClick={() => applyHighlight('red')} className="px-3 py-1.5 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded shadow transition">Needs Work</button>
                  )}
                  {selectionMenu.showRemove && (
                    <button onClick={() => applyHighlight('neutral')} className="px-3 py-1.5 bg-slate-500 hover:bg-slate-600 text-white text-xs font-bold rounded shadow transition">Remove Highlight</button>
                  )}
                </div>
              )}

              {/* Context Menu UI Elements */}
              {contextMenu.visible && (
                <div className="fixed bg-white border border-slate-200 shadow-xl rounded-xl py-2 w-48 z-[9998] text-xs font-semibold text-slate-700" style={{ top: contextMenu.y, left: contextMenu.x }} onClick={(e) => e.stopPropagation()}>
                  {contextMenu.type === 'sidebar' && (
                    <button onClick={() => { const newName = prompt("Enter new folder name:"); if (newName && newName.trim()) { const newId = generateId(); updateDocState([...folders, { id: newId, name: newName.trim(), rating: 0 }], paragraphs); setSelectedFolderId(newId); setLastActiveFolderId(newId); } setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2"><PlusIcon className="w-3.5 h-3.5 text-slate-400" /> New Folder</button>
                  )}
                  {contextMenu.type === 'folder' && (() => {
                    const idx = folders.findIndex(f => f.id === contextMenu.targetId);
                    return (
                      <>
                        <button onClick={() => { const folder = folders.find(f => f.id === contextMenu.targetId); if (folder) { setEditingFolderId(folder.id); setTempFolderName(folder.name); } setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Rename Folder</button>
                        <button onClick={() => { const folder = folders.find(f => f.id === contextMenu.targetId); if (folder) { setEditingRatingFolderId(folder.id); setTempRatingFolderVal(String(folder.rating || 0)); } setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Type Percentage</button>
                        {(idx > 0 || idx < folders.length - 1) && <div className="border-t border-slate-100 my-1"></div>}
                        {idx > 0 && (
                          <button onClick={() => { moveFolder(contextMenu.targetId, -1); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Move Up ↑</button>
                        )}
                        {idx < folders.length - 1 && (
                          <button onClick={() => { moveFolder(contextMenu.targetId, 1); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Move Down ↓</button>
                        )}
                        <div className="border-t border-slate-100 my-1"></div>
                        <button onClick={() => { if (confirm("Are you sure you want to delete this folder?")) deleteFolder(contextMenu.targetId); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600 flex items-center gap-2"><TrashIcon className="w-3.5 h-3.5" /> Delete Folder</button>
                      </>
                    );
                  })()}
                  {contextMenu.type === 'main' && (
                    <button onClick={() => { const text = prompt("Enter paragraph content:"); if (text && text.trim()) updateDocState(folders, [...paragraphs, { id: generateId(), folderId: selectedFolderId, text: text.trim(), textBack: '', createdAt: Date.now(), archived: false, studyCount: 0, lastStudied: null }]); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2"><PlusIcon className="w-3.5 h-3.5 text-slate-400" /> Add Paragraph</button>
                  )}
                  {contextMenu.type === 'paragraph' && (() => {
                    const idx = filteredParagraphs.findIndex(p => p.id === contextMenu.targetId);
                    return (
                      <>
                        {idx > 0 && (
                          <button onClick={() => { moveParagraph(contextMenu.targetId, -1); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Move Up ↑</button>
                        )}
                        {idx < filteredParagraphs.length - 1 && (
                          <button onClick={() => { moveParagraph(contextMenu.targetId, 1); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Move Down ↓</button>
                        )}
                        <div className="border-t border-slate-100 my-1"></div>
                        <button onClick={() => { const para = paragraphs.find(p => p.id === contextMenu.targetId); if (para) startEditing(para); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">Edit Paragraph</button>
                        <button onClick={() => { toggleArchive(contextMenu.targetId); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2">{paragraphs.find(p => p.id === contextMenu.targetId)?.archived ? "Restore" : "Archive"}</button>
                        <div className="border-t border-slate-100 my-1"></div>
                        <button onClick={() => { if (confirm("Are you sure you want to delete this paragraph?")) deleteParagraph(contextMenu.targetId); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-red-50 text-red-600 flex items-center gap-2"><TrashIcon className="w-3.5 h-3.5" /> Delete Paragraph</button>
                      </>
                    );
                  })()}
                  {contextMenu.type === 'header' && (
                    <>
                      <button onClick={() => { switchTab('editor'); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Switch to Paragraph Database</button>
                      <button onClick={() => { switchTab('readable'); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Switch to App Data</button>
                      <div className="border-t border-slate-100 my-1"></div>
                      <button onClick={() => { setShowArchived(prev => !prev); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center justify-between"><span>Show Archived Items</span>{showArchived && <CheckIcon className="w-3.5 h-3.5 text-blue-500" />}</button>
                      {currentFolder && (
                        <>
                          <div className="border-t border-slate-100 my-1"></div>
                          <button onClick={() => { changeFolderRating(currentFolder.id, 0); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Reset Rating to 0%</button>
                          <button onClick={() => { changeFolderRating(currentFolder.id, 100); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Set Rating to 100%</button>
                        </>
                      )}
                    </>
                  )}
                  {contextMenu.type === 'default' && (
                    <>
                      <button onClick={() => { const newName = prompt("Enter new folder name:"); if (newName && newName.trim()) { const newId = generateId(); updateDocState([...folders, { id: newId, name: newName.trim(), rating: 0 }], paragraphs); setSelectedFolderId(newId); setLastActiveFolderId(newId); } setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2"><PlusIcon className="w-3.5 h-3.5 text-slate-400" /> New Folder</button>
                      <div className="border-t border-slate-100 my-1"></div>
                      <button onClick={() => { undo(); setContextMenu(prev => ({ ...prev, visible: false })); }} disabled={undoStack.length === 0} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2 disabled:opacity-50">Undo Action (Ctrl+Z)</button>
                      <button onClick={() => { redo(); setContextMenu(prev => ({ ...prev, visible: false })); }} disabled={redoStack.length === 0} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-2 disabled:opacity-50">Redo Action (Ctrl+Y)</button>
                      <div className="border-t border-slate-100 my-1"></div>
                      <button onClick={() => { switchTab('editor'); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Switch to Paragraph Database</button>
                      <button onClick={() => { switchTab('readable'); setContextMenu(prev => ({ ...prev, visible: false })); }} className="w-full text-left px-4 py-2 hover:bg-slate-50">Switch to App Data</button>
                      <div className="border-t border-slate-100 my-1"></div>
                      <a href="https://docs.google.com/document/d/1Fn4eP4-YcuXF119SB38wigovuIIpAgUAeYYyFh1tN3I/edit?tab=t.3fk3keohztvz#bookmark=id.ks51rs9zln6r" target="_blank" rel="noopener noreferrer" className="w-full text-left px-4 py-2 hover:bg-slate-50 block text-blue-600 font-bold" onClick={() => setContextMenu(prev => ({ ...prev, visible: false }))}>Save Data (External Doc)</a>
                    </>
                  )}
                </div>
              )}

              {/* Stat Details Modal */}
              {statModal.visible && (
                <div className="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-900/50 p-4 md:p-6" onClick={() => setStatModal({ visible: false, title: '', paras: [] })}>
                  <div className="bg-white rounded-2xl shadow-xl w-full max-w-[95vw] md:max-w-2xl max-h-[85vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
                    <div className="flex justify-between items-center p-4 md:p-6 border-b border-slate-100">
                      <h3 className="text-lg md:text-xl font-bold text-slate-800">{statModal.title} ({statModal.paras.length})</h3>
                      <button onClick={() => setStatModal({ visible: false, title: '', paras: [] })} className="text-slate-400 hover:text-slate-600 p-1">
                        <svg className="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                      </button>
                    </div>
                    <div className="p-4 md:p-6 overflow-y-auto space-y-3 md:space-y-4">
                      {statModal.paras.length === 0 ? (
                        <p className="text-slate-500 text-center py-4 text-sm md:text-base">No paragraphs found for this category.</p>
                      ) : (
                        statModal.paras.map(p => (
                          <div key={p.id} onClick={() => {
                            setStatModal({ visible: false, title: '', paras: [] });
                            setIsMobileMenuOpen(false);
                            setSelectedFolderId(p.folderId);
                            setActiveTab('editor');
                            setTimeout(() => setHighlightParaId(p.id), 50);
                          }} className="cursor-pointer p-3 md:p-4 bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 transition-colors">
                            <div className="text-[10px] md:text-xs text-indigo-600 font-semibold mb-1 md:mb-2">{folders.find(f => f.id === p.folderId)?.name}</div>
                            <div className="text-xs md:text-sm text-slate-700 line-clamp-3" dangerouslySetInnerHTML={{ __html: p.text }} />
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
